name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version to publish (for example, v0.1.1)
        required: true
        type: string

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.25.x
      - name: test with race detector
        run: go test -race ./...
      - name: vulnerability check
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
      - name: secret history scan
        if: ${{ env.GITLEAKS_LICENSE != '' }}
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        with:
          config: .gitleaks.toml
      - name: skip secret history scan (missing license)
        if: ${{ env.GITLEAKS_LICENSE == '' }}
        run: |
          echo "Skipping gitleaks scan: GITLEAKS_LICENSE secret is not configured."

  install-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.25.x
      - name: install release candidate
        run: go install ./cmd/struktly
      - name: clean-repository smoke test
        shell: bash
        run: |
          root="$(mktemp -d)"
          git -C "$root" init --quiet
          git -C "$root" config user.name "Struktly CI"
          git -C "$root" config user.email "ci@struktly.invalid"
          printf '# smoke repository\n' > "$root/README.md"
          git -C "$root" add README.md
          git -C "$root" commit --quiet -m initial
          "$(go env GOPATH)/bin/struktly" init --root "$root"
          "$(go env GOPATH)/bin/struktly" brief --root "$root" "smoke test"
          "$(go env GOPATH)/bin/struktly" validate --root "$root"

  publish-release:
    runs-on: ubuntu-latest
    needs: [verify, install-smoke]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version must use the form vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi

          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "release already exists for $VERSION"
            exit 0
          fi

          gh release create "$VERSION" \
            --draft \
            --target "$GITHUB_SHA" \
            --title "$VERSION" \
            --generate-notes
          gh release edit "$VERSION" --draft=false --latest
