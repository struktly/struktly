name: Release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.25.x
      - name: test with race detector
        run: go test -race ./...
      - name: vulnerability check
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
      - name: secret history scan
        if: ${{ env.GITLEAKS_LICENSE != '' }}
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        with:
          config: .gitleaks.toml
      - name: skip secret history scan (missing license)
        if: ${{ env.GITLEAKS_LICENSE == '' }}
        run: |
          echo "Skipping gitleaks scan: GITLEAKS_LICENSE secret is not configured."

  install-smoke:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.25.x
      - name: install tagged module
        run: go install github.com/struktly/struktly/cmd/struktly@${{ github.ref_name }}
      - name: clean-repository smoke test
        shell: bash
        run: |
          root="$(mktemp -d)"
          git -C "$root" init --quiet
          git -C "$root" config user.name "Struktly CI"
          git -C "$root" config user.email "ci@struktly.invalid"
          printf '# smoke repository\n' > "$root/README.md"
          git -C "$root" add README.md
          git -C "$root" commit --quiet -m initial
          "$(go env GOPATH)/bin/struktly" init --root "$root"
          "$(go env GOPATH)/bin/struktly" brief --root "$root" "smoke test"
          "$(go env GOPATH)/bin/struktly" validate --root "$root"

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: [verify, install-smoke]
    steps:
      - name: publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "release already exists for ${{ github.ref_name }}"
            exit 0
          fi

          gh release create "${{ github.ref_name }}" \
            --verify-tag \
            --target "${{ github.sha }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
